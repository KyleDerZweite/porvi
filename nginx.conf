# Internal Porvi static origin.
#
# Public TLS termination and domain routing should happen at Pangolin or another
# dedicated edge. Porvi generates host-map snippets from verified published
# domains, mapping each Host header to the project's current published path.
#
# Example generated entries:
#   map $host $site_root {
#       example.com /srv/porvi/published/projects/project_123/current;
#       www.example.com /srv/porvi/published/projects/project_123/current;
#       default "";
#   }
include /etc/nginx/conf.d/porvi-*.map;

server {
    listen 8080;
    server_name _;

    root $site_root;
    index index.html;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        if ($site_root = "") {
            return 404;
        }

        try_files $uri $uri/ /index.html =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }
}
