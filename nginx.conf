# Subdomain routing - maps Host header to a site directory under /sites/<name>/dist
map $host $site_folder {
    default                             "__missing__";
    ~^(?<subdomain>[a-z0-9-]+)\.kylehub\.dev$ $subdomain;
}

server {
    listen 80;
    server_name *.kylehub.dev;

    root /usr/share/nginx/html/sites/$site_folder/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }
}
